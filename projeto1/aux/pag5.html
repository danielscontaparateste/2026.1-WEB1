<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>

    <form>
        <label for="iptNomeID" id="lblNome">Nome: </label>
        <input type="text" id="iptNomeID" name="iptNomeName">
        <label for="iptPassID" id="lblPass">Senha: </label>
        <input type="password" id="iptPassID" name="iptPassName">
        <br>

        <span>Qual o seu semestre no Curso Técnico em Informática? </span><br>
        <input type="radio" id="iptSemestre1" name="semestre" value="1">
        <label for="iptSemestre1">Primeiro Semestre</label><br>
        <input type="radio" id="iptSemestre2" name="semestre" value="2">
        <label for="iptSemestre2">Segundo Semestre</label><br>
        <input type="radio" id="iptSemestre3" name="semestre" value="3">
        <label for="iptSemestre3">Terceiro Semestre</label><br>
        <input type="radio" id="iptSemestre4" name="semestre" value="4">
        <label for="iptSemestre4">Quarto Semestre</label><br>

        <input type="button" value="Enviar">
         <!-- <input type="submit" value="Enviar"> -->
    </form>
</body>
</html>
